<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into the Void</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: #cccccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #ui-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 80%; max-width: 600px;
            transition: opacity 1.5s ease, filter 1.5s ease;
        }

        textarea {
            width: 100%; height: 250px;
            background: transparent; border: 1px solid #333;
            color: #ddd; padding: 20px; font-size: 16px;
            font-family: inherit; resize: none; outline: none;
            border-radius: 5px; box-sizing: border-box; line-height: 1.5;
        }

        button {
            margin-top: 25px; padding: 10px 40px;
            background: transparent; border: 1px solid #555;
            color: #aaa; cursor: pointer; font-size: 16px;
            border-radius: 3px; transition: all 0.3s ease;
            letter-spacing: 2px; text-transform: uppercase;
        }

        button:hover {
            background: #222; color: #fff; border-color: #fff;
        }

        button:disabled {
            opacity: 0.4; cursor: default;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
            pointer-events: none;
        }

        .dissolve {
            opacity: 0; filter: blur(12px);
        }
    </style>
</head>
<body>

    <canvas id="voidCanvas"></canvas>

    <div id="ui-container">
        <textarea id="message" placeholder="Type what you need to say. Nothing is saved..."></textarea>
        <button id="releaseBtn">Release</button>
    </div>

    <script>
        const canvas = document.getElementById('voidCanvas');
        const ctx = canvas.getContext('2d');
        const uiContainer = document.getElementById('ui-container');
        const messageInput = document.getElementById('message');
        const releaseBtn = document.getElementById('releaseBtn');

        let width, height;
        let particles = [];
        let isAnimating = false;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = Math.random() * -2 - 0.5;
                this.opacity = 1;
                this.fadeRate = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= this.fadeRate;
            }
            draw() {
                ctx.fillStyle = `rgba(220, 220, 220, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            const centerX = width / 2;
            const centerY = height / 2;
            const textLength = messageInput.value.length;
            // Cap at 800 so a wall of text doesn't tank the frame rate
            const particleCount = Math.min(Math.max(textLength * 3, 50), 800);

            for (let i = 0; i < particleCount; i++) {
                const x = centerX + (Math.random() - 0.5) * Math.min(width * 0.8, 600);
                const y = centerY + (Math.random() - 0.5) * 250;
                particles.push(new Particle(x, y));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            let activeParticles = false;
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity > 0) activeParticles = true;
            }

            if (activeParticles) {
                requestAnimationFrame(animate);
            } else {
                isAnimating = false;
                particles = [];
                messageInput.value = '';
                uiContainer.classList.remove('dissolve');
                releaseBtn.disabled = false;
            }
        }

        releaseBtn.addEventListener('click', () => {
            if (messageInput.value.trim() === '' || isAnimating) return;

            isAnimating = true;
            releaseBtn.disabled = true; // block double-clicks mid-animation
            uiContainer.classList.add('dissolve');

            setTimeout(() => {
                createParticles();
                animate();
            }, 600);
        });
    </script>
</body>
</html>
