<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into the Void</title>
</head>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: #cccccc;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #ui-container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 80%; max-width: 600px;
            transition: opacity 1.5s ease, filter 1.5s ease;
        }

        textarea {
            width: 100%; height: 250px;
            background: transparent; border: 1px solid #333;
            color: #ddd; padding: 20px; font-size: 16px;
            font-family: inherit; resize: none; outline: none;
            border-radius: 5px; box-sizing: border-box; line-height: 1.5;
        }

        button {
            margin-top: 25px; padding: 10px 40px;
            background: transparent; border: 1px solid #555;
            color: #aaa; cursor: pointer; font-size: 16px;
            border-radius: 3px; transition: all 0.3s ease;
            letter-spacing: 2px; text-transform: uppercase;
        }

        button:hover {
            background: #222; color: #fff; border-color: #fff;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
            pointer-events: none; 
        }

        .dissolve {
            opacity: 0; filter: blur(12px);
        }
    </style>
<body>

    <canvas id="voidCanvas"></canvas>

    <div id="ui-container">
        <textarea id="message" placeholder="Type what you need to say. Nothing is saved..."></textarea>
        <button id="releaseBtn">Release</button>
    </div>

</body>
</html>
